<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Paylaşım - Pro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin: 5px 0; }
        .btn-nfc { background: #28a745; }
        .status-box { background: #eee; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.85em; min-height: 20px; color: #333; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #download-link { display: none; background: #d4edda; color: #155724; padding: 10px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hızlı Dosya Paylaş</h2>
    
    <div style="font-size: 0.9em; color: #666;">Cihaz ID:</div>
    <div id="my-id" style="font-weight: bold; color: #007bff; font-size: 1.1em;">Yükleniyor...</div>
    <div id="qrcode"></div>

    <div class="status-box" id="status">Sistem başlatılıyor...</div>

    <button class="btn btn-nfc" onclick="writeToNFC()">ID'yi NFC'ye Yaz</button>
    <hr>
    <button class="btn btn-nfc" onclick="readFromNFC()">NFC'den ID Oku</button>
    <input type="text" id="peer-id-input" placeholder="Bağlanılacak ID">
    <button class="btn" id="connect-btn">Cihaza Bağlan</button>

    <div id="transfer-area" style="display:none; border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px;">
        <input type="file" id="file-input">
        <button class="btn" style="background: #dc3545;" id="send-btn">Dosyayı Gönder</button>
    </div>

    <a id="download-link">Dosyayı İndir</a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const peerIdInput = document.getElementById('peer-id-input');
    const transferArea = document.getElementById('transfer-area');

    // PeerJS Yapılandırması (STUN sunucuları bağlantıyı garantiye alır)
    const peer = new Peer({
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });

    let conn;

    // Sistem açıldığında
    peer.on('open', (id) => {
        myIdEl.innerText = id;
        statusEl.innerText = "Bağlantı hazır. Diğer cihazı bekleyin.";
        new QRCode(document.getElementById("qrcode"), { text: id, width: 120, height: 120 });
    });

    // BAĞLAN BUTONU
    document.getElementById('connect-btn').onclick = () => {
        const remoteId = peerIdInput.value.trim();
        if (!remoteId) return alert("ID girin!");
        
        statusEl.innerText = "Bağlanıyor...";
        conn = peer.connect(remoteId);
        setupEvents();
    };

    // BİRİ BİZE BAĞLANDIĞINDA
    peer.on('connection', (connection) => {
        conn = connection;
        setupEvents();
        statusEl.innerText = "Cihaz bağlandı!";
    });

    // BAĞLANTI OLAYLARI
    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "Bağlantı Kuruldu! Dosya seçebilirsiniz.";
            transferArea.style.display = "block";
        });

        conn.on('data', (data) => {
            statusEl.innerText = "Dosya alındı!";
            const blob = new Blob([data.file]);
            const url = URL.createObjectURL(blob);
            const dl = document.getElementById('download-link');
            dl.href = url;
            dl.download = data.filename;
            dl.style.display = "block";
            dl.innerText = "📥 İndir: " + data.filename;
        });

        conn.on('error', (err) => {
            statusEl.innerText = "Hata: " + err;
        });
    }

    // DOSYA GÖNDERME
    document.getElementById('send-btn').onclick = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) return alert("Dosya seçin!");
        
        statusEl.innerText = "Gönderiliyor...";
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: reader.result, filename: file.name });
            statusEl.innerText = "Başarıyla gönderildi!";
        };
        reader.readAsArrayBuffer(file);
    };

    // NFC İŞLEMLERİ
    async function writeToNFC() {
        try {
            const ndef = new NDEFReader();
            await ndef.write(myIdEl.innerText);
            statusEl.innerText = "NFC Yazıldı!";
        } catch (e) { statusEl.innerText = "NFC Yazma Hatası: " + e.message; }
    }

    async function readFromNFC() {
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            ndef.onreading = event => {
                const decoder = new TextDecoder();
                const id = decoder.decode(event.message.records[0].data);
                peerIdInput.value = id;
                document.getElementById('connect-btn').click();
            };
        } catch (e) { statusEl.innerText = "NFC Okuma Hatası: " + e.message; }
    }

    // PeerJS Genel Hataları
    peer.on('error', (err) => {
        statusEl.innerText = "Sistem Hatası: " + err.type;
        console.error(err);
    });
</script>
</body>
</html>
