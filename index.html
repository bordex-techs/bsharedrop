<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordex Entropy v5 - Speed Edition</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --accent: #22d3ee; --panel: #0f172a; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--accent); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .status { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8em; text-align: center; border: 1px solid var(--accent); }
        #qrcode { filter: invert(0.9); display: flex; justify-content: center; margin: 15px 0; background: white; padding: 10px; border-radius: 8px; }
        input, button { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { cursor: pointer; color: var(--accent); font-weight: bold; border-color: var(--accent); transition: 0.2s; }
        button:hover { background: var(--accent); color: #020617; }
        #canvas-wrap { margin-top: 15px; }
        canvas { background: white; border-radius: 8px; touch-action: none; width: 100%; height: 250px; cursor: crosshair; }
        .progress-bar { height: 4px; background: #334155; margin: 10px 0; display: none; overflow: hidden; border-radius: 2px; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
        .id-badge { font-size: 0.65em; opacity: 0.5; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0 0 20px 0;">ENTROPY SPEED ⚡</h2>
    <div id="status" class="status">SİSTEM ANALİZ EDİLİYOR...</div>

    <div id="setup-area">
        <div id="qrcode"></div>
        <input type="text" id="target-id" placeholder="HEDEF ANAHTARI GİRİN">
        <button onclick="connectToPeer(document.getElementById('target-id').value)">Bağlan ve Hızlan</button>
        <div class="id-badge">ANAHTAR: <span id="my-id">...</span></div>
    </div>

    <div id="app-area" style="display:none;">
        <div id="canvas-wrap">
            <canvas id="live-canvas"></canvas>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <button style="font-size:0.7em;" onclick="clearCanvas()">SİL</button>
                <button style="font-size:0.7em;" onclick="document.getElementById('img-loader').click()">RESİM EKLE</button>
            </div>
            <input type="file" id="img-loader" style="display:none" accept="image/*" onchange="loadImgToCanvas(event)">
        </div>

        <input type="text" id="secret-msg" placeholder="GİZLİ NOT (OPSİYONEL)">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.7em;">
            <div>KİLİT SAATİ:<input type="time" id="lock-time"></div>
            <div style="display:flex; align-items:center; justify-content:center;"><input type="checkbox" id="self-destruct"> İMHA MODU</div>
        </div>
        
        <div class="progress-bar" id="p-bar"><div id="progress-fill"></div></div>
        <button id="send-btn" onclick="sendPayload()" style="border-width: 2px;">JET TRANSFERİ BAŞLAT 🚀</button>
        <input type="file" id="file-input" style="margin-top:10px;">
    </div>

    <div id="receive-area" style="display:none;">
        <div id="timer-display" style="text-align:center; color:#ef4444; font-weight:bold; margin-bottom:10px;"></div>
        <div id="msg-display" style="background:#1e293b; padding:10px; margin-bottom:10px; font-size:0.8em; border-radius:8px; display:none;"></div>
        <a id="download-link" style="text-decoration:none;"><button>DOSYAYI ÇÖZ VE KAYDET</button></a>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('live-canvas');
    const ctx = canvas.getContext('2d');
    const pFill = document.getElementById('progress-fill');
    const pBar = document.getElementById('p-bar');

    // Tahmin Edilemez Yüksek Hızlı ID
    const myID = 'brdx-' + Math.random().toString(36).substr(2, 9);
    const peer = new Peer(myID, { debug: 1 });
    let conn;

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        new QRCode(document.getElementById("qrcode"), { text: window.location.href + "?key=" + id, width: 150, height: 150 });
        statusEl.innerText = "SİNYAL AKTİF - BEKLENİYOR";
        const urlKey = new URLSearchParams(window.location.search).get('key');
        if (urlKey) connectToPeer(urlKey);
    });

    function connectToPeer(id) {
        if(!id) return;
        statusEl.innerText = "HEDEFE KİLİTLENİLİYOR...";
        // WebRTC Veri Kanalı Ayarları (En Hızlı Mod)
        conn = peer.connect(id, { reliable: true });
        setupEvents();
    }

    peer.on('connection', (c) => { conn = c; setupEvents(); });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ YÜKSEK HIZLI BAĞLANTI KURULDU";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
        });

        conn.on('data', (data) => {
            if(data.type === 'draw') draw(data.x, data.y, data.isNew, false);
            else if(data.type === 'clear') ctx.clearRect(0,0,canvas.width,canvas.height);
            else if(data.type === 'payload') handleIncoming(data);
        });
    }

    // --- CANLI TUVAL ---
    canvas.width = 400; canvas.height = 250;
    ctx.lineWidth = 3; ctx.strokeStyle = '#22d3ee'; ctx.lineCap = 'round';
    let drawing = false;

    function draw(x, y, isNew, send) {
        if (isNew) ctx.beginPath();
        ctx.lineTo(x, y); ctx.stroke();
        if (send && conn) conn.send({type:'draw', x, y, isNew});
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const c = e.touches ? e.touches[0] : e;
        return { x: (c.clientX - r.left) * (canvas.width / r.width), y: (c.clientY - r.top) * (canvas.height / r.height) };
    };

    canvas.onmousedown = (e) => { drawing = true; const p = getPos(e); draw(p.x, p.y, true, true); };
    canvas.onmousemove = (e) => { if(drawing) { const p = getPos(e); draw(p.x, p.y, false, true); } };
    window.onmouseup = () => drawing = false;
    canvas.ontouchstart = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); draw(p.x, p.y, true, true); };
    canvas.ontouchmove = (e) => { e.preventDefault(); if(drawing) { const p = getPos(e); draw(p.x, p.y, false, true); } };

    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); conn.send({type:'clear'}); }
    function loadImgToCanvas(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    // --- JET TRANSFER SİSTEMİ ---
    function sendPayload() {
        const file = document.getElementById('file-input').files[0];
        if(!file) return alert("Hızlanmak için bir dosya seçin!");

        pBar.style.display = "block";
        let progress = 0;
        const interval = setInterval(() => { // Simülasyon değil, paketleme hızı
            progress += 10; pFill.style.width = progress + "%";
            if(progress >= 100) clearInterval(interval);
        }, 50);

        const reader = new FileReader();
        reader.onload = () => {
            conn.send({
                type: 'payload',
                file: reader.result,
                name: file.name,
                msg: document.getElementById('secret-msg').value,
                unlock: document.getElementById('lock-time').value ? getUnlockTime() : null,
                destruct: document.getElementById('self-destruct').checked
            });
            statusEl.innerText = "VERİ IŞINLANDI! ⚡";
            setTimeout(() => { pBar.style.display = "none"; pFill.style.width = "0%"; }, 2000);
        };
        reader.readAsArrayBuffer(file);
    }

    function getUnlockTime() {
        const [h, m] = document.getElementById('lock-time').value.split(':');
        const d = new Date(); d.setHours(h, m, 0);
        if(d < new Date()) d.setDate(d.getDate() + 1);
        return d.getTime();
    }

    function handleIncoming(data) {
        document.getElementById('app-area').style.display = 'none';
        document.getElementById('receive-area').style.display = 'block';
        const dl = document.getElementById('download-link');
        
        if(data.msg) {
            const m = document.getElementById('msg-display');
            m.innerText = "STRATEJİK NOT: " + data.msg; m.style.display = "block";
        }

        const url = URL.createObjectURL(new Blob([data.file]));
        dl.href = url; dl.download = data.name;

        if(data.unlock) {
            dl.style.display = "none";
            const itv = setInterval(() => {
                const diff = data.unlock - new Date().getTime();
                if(diff <= 0) { clearInterval(itv); dl.style.display = "block"; document.getElementById('timer-display').innerText = "ERİŞİM İZNİ VERİLDİ"; }
                else { document.getElementById('timer-display').innerText = "KİLİT: " + Math.ceil(diff/1000) + "S"; }
            }, 1000);
        }

        if(data.destruct) {
            dl.onclick = () => { setTimeout(() => { document.body.innerHTML = "<div style='color:red; text-align:center; padding:50px;'>VERİ KENDİNİ İMHA ETTİ.</div>"; }, 500); };
        }
    }
</script>
</body>
</html>
