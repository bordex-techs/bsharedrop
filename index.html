<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salla ve Bağlan!</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #2d3748; padding: 30px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border: 2px solid #4a5568; }
        .shake-icon { font-size: 50px; margin-bottom: 20px; animation: shake 0.5s infinite; display: inline-block; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); } }
        .status { background: #4a5568; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9em; }
        .btn { background: #4299e1; color: white; border: none; padding: 15px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #download-link { display: none; margin-top: 20px; color: #63b3ed; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="shake-icon">📱</div>
    <h2>Salla ve Bağlan</h2>
    <p style="color: #a0aec0; font-size: 0.8em;">Bağlanmak için iki telefonu aynı anda sallayın!</p>
    
    <div class="status" id="status">Sensör izni bekleniyor...</div>
    
    <button class="btn" id="start-btn">Sensörleri ve Sistemi Başlat</button>

    <div id="transfer-area" style="display:none; margin-top: 20px;">
        <input type="file" id="file-input" style="margin-bottom: 10px; width: 100%;">
        <button class="btn" style="background: #f56565;" id="send-btn">Dosyayı Fırlat 🚀</button>
    </div>

    <a id="download-link">📥 Dosyayı Al</a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');
    const transferArea = document.getElementById('transfer-area');
    const fileInput = document.getElementById('file-input');
    const sendBtn = document.getElementById('send-btn');

    let peer = new Peer();
    let conn;
    let myId = "";

    peer.on('open', (id) => {
        myId = id;
        statusEl.innerText = "Sistem hazır. Şimdi butona bas ve salla!";
    });

    // SENSÖR VE BAĞLANTI BAŞLATMA
    startBtn.onclick = () => {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            // iOS için izin alma
            DeviceMotionEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        initInertia();
                    }
                });
        } else {
            // Android ve diğerleri
            initInertia();
        }
        startBtn.style.display = "none";
    };

    function initInertia() {
        statusEl.innerText = "Sallama algılanıyor... Telefonu salla!";
        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            const threshold = 15; // Sallama hassasiyeti (Bunu artırıp azaltabilirsin)
            
            if (Math.abs(acc.x) > threshold || Math.abs(acc.y) > threshold || Math.abs(acc.z) > threshold) {
                handleShake();
            }
        });
    }

    let lastShake = 0;
    function handleShake() {
        const now = Date.now();
        if (now - lastShake < 2000) return; // 2 saniye içinde tekrar tetiklenme
        lastShake = now;

        statusEl.innerText = "Sallama Algılandı! ⚡ Bağlantı aranıyor...";
        
        // Yarışma/Proje için Not: Normalde burada bir sunucuya "Salladım" bilgisi gider.
        // Biz şimdilik manuel ID'yi sallayınca ekrana yazdırıp hızlandırıyoruz.
        // (Tam otomatik olması için bir Firebase veya Node.js sunucusu gerekir)
        
        // Demo amaçlı: Sallayınca ID'yi panoya kopyalar, böylece hızla paylaşabilirsin.
        navigator.clipboard.writeText(myId);
        alert("ID'n kopyalandı: " + myId + "\nŞimdi diğer telefona sallayarak gönder!");
    }

    // PEER OLAYLARI
    peer.on('connection', (connection) => {
        conn = connection;
        setupEvents();
    });

    function setupEvents() {
        statusEl.innerText = "✅ Bağlantı Kuruldu!";
        transferArea.style.display = "block";

        conn.on('data', (data) => {
            const blob = new Blob([data.file]);
            const url = URL.createObjectURL(blob);
            const dl = document.getElementById('download-link');
            dl.href = url;
            dl.download = data.filename;
            dl.style.display = "block";
            dl.innerText = "📥 Dosyayı İndir: " + data.filename;
        });
    }

    sendBtn.onclick = () => {
        const file = fileInput.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: reader.result, filename: file.name });
            statusEl.innerText = "Dosya gönderildi! 🚀";
        };
        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
