<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı QR Paylaşım</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        .status { background: #edf2f7; padding: 15px; border-radius: 10px; margin: 15px 0; font-weight: bold; color: #2d3748; }
        .btn { background: #3182ce; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #transfer-area { display: none; border-top: 2px solid #eee; padding-top: 20px; }
        input[type="file"] { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Hızlı Bağlan 🚀</h2>
    <div id="status" class="status">Sistem başlatılıyor...</div>
    
    <div id="my-info">
        <p style="font-size: 0.8em; color: #666;">Diğer telefon bu QR'ı taratınca anında bağlanır:</p>
        <div id="qrcode"></div>
        <p id="my-id-display" style="font-size: 0.7em; color: #aaa;"></p>
    </div>

    <div id="transfer-area">
        <input type="file" id="file-input">
        <button class="btn" style="background: #38a169;" id="send-btn">Dosyayı Gönder</button>
    </div>

    <a id="download-link" style="display:none; margin-top:20px; display:block; color: #3182ce; font-weight:bold;"></a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const myIdDisplay = document.getElementById('my-id-display');
    const transferArea = document.getElementById('transfer-area');
    
    // 1. PeerJS Yapılandırması
    const peer = new Peer({
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
    });

    let conn;

    peer.on('open', (id) => {
        myIdDisplay.innerText = "ID: " + id;
        
        // --- KRİTİK KISIM: Akıllı Link Oluşturma ---
        // Sitenin şu anki URL'sini al ve sonuna ?join=ID ekle
        const currentUrl = window.location.origin + window.location.pathname;
        const smartLink = currentUrl + "?join=" + id;
        
        // QR Kodu bu akıllı linkle oluştur
        new QRCode(document.getElementById("qrcode"), {
            text: smartLink,
            width: 180,
            height: 180
        });

        statusEl.innerText = "QR Hazır! Tarat ve Bağlan.";

        // --- OTOMATİK BAĞLANMA KONTROLÜ ---
        // Eğer birisi bu linkle (ID ile) siteye girdiyse
        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        
        if (joinId) {
            statusEl.innerText = "Otomatik bağlanılıyor: " + joinId;
            connectToPeer(joinId);
        }
    });

    function connectToPeer(targetId) {
        conn = peer.connect(targetId);
        setupEvents();
    }

    peer.on('connection', (c) => {
        conn = c;
        setupEvents();
    });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ Bağlantı Kuruldu!";
            transferArea.style.display = "block";
        });

        conn.on('data', (data) => {
            const blob = new Blob([data.file]);
            const url = URL.createObjectURL(blob);
            const dl = document.getElementById('download-link');
            dl.href = url;
            dl.download = data.filename;
            dl.innerText = "📥 Dosyayı İndir: " + data.filename;
            statusEl.innerText = "Dosya Alındı!";
        });
    }

    document.getElementById('send-btn').onclick = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: reader.result, filename: file.name });
            statusEl.innerText = "Gönderildi! 🚀";
        };
        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
