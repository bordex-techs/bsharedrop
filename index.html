<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic & Live Canvas Transfer</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/quiet/quiet-js/quiet.js"></script>
    <style>
        :root { --p: #8b5cf6; --s: #10b981; --bg: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .status { background: #334155; padding: 12px; border-radius: 12px; margin: 15px 0; font-size: 0.9em; color: #e2e8f0; border-left: 4px solid var(--p); }
        #canvas-container { display: none; margin-top: 20px; }
        canvas { background: white; border-radius: 12px; touch-action: none; width: 100%; max-width: 350px; height: 200px; }
        .btn { border: none; padding: 14px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin: 5px 0; }
        .btn-sonic { background: #ec4899; } /* Pembe: Sesle eşleşme */
        .btn-blue { background: var(--p); }
        #download-link { display: none; background: rgba(16, 185, 129, 0.2); color: var(--s); padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0;">Sihirli Sonic Transfer 🔊</h2>
    <div id="status" class="status">Sistem başlatılıyor...</div>

    <div id="setup-area">
        <button class="btn btn-sonic" onclick="broadcastId()">🔊 Sesle ID Yayını Yap</button>
        <button class="btn btn-sonic" style="background:#06b6d4;" onclick="startListening()">🎤 Sesle Bağlan (Dinle)</button>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
        <div id="qrcode" style="display: flex; justify-content: center; background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px;"></div>
        <p style="font-size: 0.7em; color: #94a3b8;">Veya QR kodu taratın</p>
    </div>

    <div id="canvas-container">
        <p style="margin: 5px 0; font-size: 0.8em; color: #94a3b8;">Ortak Çizim Alanı</p>
        <canvas id="live-canvas"></canvas>
        <button class="btn" style="background:#475569; padding: 8px;" onclick="clearCanvas()">Temizle</button>
    </div>

    <div id="transfer-area" style="display:none; margin-top:15px;">
        <input type="file" id="file-input" style="width: 100%; margin-bottom: 10px;">
        <button class="btn btn-blue" id="send-btn">Dosyayı Fırlat 🚀</button>
    </div>

    <a id="download-link">📥 Dosyayı Al</a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('live-canvas');
    const ctx = canvas.getContext('2d');
    const transferArea = document.getElementById('transfer-area');
    const canvasContainer = document.getElementById('canvas-container');

    canvas.width = 350; canvas.height = 200;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#8b5cf6';

    const peer = new Peer({ config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]} });
    let conn;
    let myId = "";

    // Quiet.js Ayarları (Görünmez ses profili)
    Quiet.init({
        profiles_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/quiet-profiles.json",
        memory_initializer_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/",
        libfec_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/"
    });

    peer.on('open', (id) => {
        myId = id;
        const smartLink = window.location.origin + window.location.pathname + "?join=" + id;
        new QRCode(document.getElementById("qrcode"), { text: smartLink, width: 140, height: 140 });
        statusEl.innerText = "Sistem Hazır. Ses veya QR ile bağlanın.";

        const urlParams = new URLSearchParams(window.location.search);
        const joinId = urlParams.get('join');
        if (joinId) connectToPeer(joinId);
    });

    // --- SESLE EŞLEŞME (SONIC PAIRING) ---
    function broadcastId() {
        try {
            const transmit = Quiet.transmitter({profile: "ultrasonic-experimental"});
            transmit.transmit(Quiet.str2ab(myId));
            statusEl.innerText = "🔊 Sesle ID yayını yapılıyor...";
            setTimeout(() => { statusEl.innerText = "Yayın bitti."; }, 5000);
        } catch(e) { statusEl.innerText = "Ses hatası: Mikrofonu açın."; }
    }

    function startListening() {
        statusEl.innerText = "🎤 Ses dinleniyor, yaklaştırın...";
        Quiet.receiver({
            profile: "ultrasonic-experimental",
            onReceive: (payload) => {
                const receivedId = Quiet.ab2str(payload);
                statusEl.innerText = "✅ Ses algılandı!";
                connectToPeer(receivedId);
            }
        });
    }

    // --- BAĞLANTI VE TUVAL ---
    function connectToPeer(id) {
        statusEl.innerText = "Bağlanılıyor...";
        conn = peer.connect(id);
        setupEvents();
    }

    peer.on('connection', (c) => {
        conn = c;
        setupEvents();
    });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ Bağlantı Kuruldu!";
            document.getElementById('setup-area').style.display = 'none';
            transferArea.style.display = 'block';
            canvasContainer.style.display = 'block';
        });

        conn.on('data', (data) => {
            if (data.type === 'draw') {
                draw(data.x, data.y, data.isNewPath, false);
            } else if (data.type === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                const blob = new Blob([data.file]);
                const url = URL.createObjectURL(blob);
                const dl = document.getElementById('download-link');
                dl.href = url; dl.download = data.filename;
                dl.style.display = "block";
                dl.innerText = "📥 İndir: " + data.filename;
                statusEl.innerText = "Yeni dosya!";
            }
        });
    }

    // Çizim Fonksiyonları
    let drawing = false;
    function draw(x, y, isNewPath, shouldSend) {
        if (isNewPath) ctx.beginPath();
        ctx.lineTo(x, y);
        ctx.stroke();
        if (shouldSend && conn && conn.open) {
            conn.send({ type: 'draw', x: x, y: y, isNewPath: isNewPath });
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    canvas.addEventListener('mousedown', (e) => { drawing = true; const p = getPos(e); draw(p.x, p.y, true, true); });
    canvas.addEventListener('mousemove', (e) => { if (drawing) { const p = getPos(e); draw(p.x, p.y, false, true); } });
    canvas.addEventListener('mouseup', () => { drawing = false; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; const p = getPos(e); draw(p.x, p.y, true, true); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (drawing) { const p = getPos(e); draw(p.x, p.y, false, true); } });
    canvas.addEventListener('touchend', () => { drawing = false; });

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (conn) conn.send({ type: 'clear' });
    }

    document.getElementById('send-btn').onclick = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: reader.result, filename: file.name });
            statusEl.innerText = "Gönderildi! 🚀";
        };
        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
