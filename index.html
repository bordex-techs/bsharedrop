<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC & WebRTC Dosya Aktarımı</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #3182ce; --success: #38a169; --bg: #f7fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        h2 { color: #2d3748; margin-bottom: 1.5rem; }
        .section { background: #edf2f7; padding: 15px; border-radius: 12px; margin-bottom: 1rem; }
        .id-text { font-size: 1.2rem; font-weight: bold; color: var(--primary); word-break: break-all; }
        #qrcode { margin: 15px auto; display: flex; justify-content: center; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; margin: 10px 0; font-size: 1rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; margin: 5px 0; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-nfc { background: var(--success); }
        .status { font-size: 0.9rem; color: #718096; margin-top: 15px; font-style: italic; }
        #download-link { display: none; margin-top: 20px; padding: 15px; background: #f0fff4; border: 1px dashed var(--success); color: var(--success); text-decoration: none; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dosya Aktarımı</h2>
    
    <div class="section">
        <p style="margin:0; font-size: 0.9rem;">Senin Cihaz Kimliğin:</p>
        <div id="my-id" class="id-text">Bağlanıyor...</div>
        <div id="qrcode"></div>
        <button class="btn btn-nfc" onclick="writeToNFC()">ID'yi NFC'ye Yaz</button>
    </div>

    <div class="section">
        <button class="btn btn-nfc" onclick="readFromNFC()">NFC Etiketi Oku</button>
        <input type="text" id="peer-id-input" placeholder="Bağlanılacak ID'yi girin">
        <button class="btn" id="connect-btn">Cihaza Bağlan</button>
    </div>

    <div id="transfer-area" style="display:none;" class="section">
        <input type="file" id="file-input">
        <button class="btn" style="background: #e53e3e;" id="send-btn">Dosyayı Gönder</button>
    </div>

    <p id="status" class="status">Durum: PeerJS başlatılıyor...</p>
    <a id="download-link">📥 Dosyayı İndir</a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const peerIdInput = document.getElementById('peer-id-input');
    const transferArea = document.getElementById('transfer-area');
    const downloadLink = document.getElementById('download-link');
    
    let peer = new Peer();
    let conn = null;
    let isNfcWorking = false;

    // 1. PeerJS Başlatma
    peer.on('open', (id) => {
        myIdEl.innerText = id;
        statusEl.innerText = "Bağlantı hazır.";
        new QRCode(document.getElementById("qrcode"), { text: id, width: 120, height: 120 });
    });

    // 2. NFC Yazma İşlemi
    async function writeToNFC() {
        if (!('NDEFReader' in window)) return alert("Web NFC bu tarayıcıda/cihazda desteklenmiyor.");
        if (isNfcWorking) return;

        try {
            isNfcWorking = true;
            const ndef = new NDEFReader();
            statusEl.innerText = "NFC Yazılıyor... Etiketi yaklaştırın.";
            await ndef.write(myIdEl.innerText);
            statusEl.innerText = "✅ Başarılı: ID NFC'ye yazıldı!";
        } catch (error) {
            statusEl.innerText = "NFC Hatası: " + error.message;
        } finally {
            isNfcWorking = false;
        }
    }

    // 3. NFC Okuma İşlemi
    async function readFromNFC() {
        if (!('NDEFReader' in window)) return alert("Web NFC desteklenmiyor.");
        
        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            statusEl.innerText = "NFC Okuma Modu: Etiketi yaklaştırın.";
            
            ndef.onreading = event => {
                const decoder = new TextDecoder();
                const record = event.message.records[0];
                const readId = decoder.decode(record.data);
                peerIdInput.value = readId;
                statusEl.innerText = "ID Okundu: " + readId;
                connectToPeer(readId);
            };
        } catch (error) {
            statusEl.innerText = "NFC Okuma Hatası: " + error.message;
        }
    }

    // 4. Bağlantı Kurma
    function connectToPeer(id) {
        if (!id) return;
        statusEl.innerText = "Bağlanılıyor: " + id;
        
        if(conn) conn.close();
        conn = peer.connect(id.trim());
        setupConnectionEvents();
    }

    document.getElementById('connect-btn').onclick = () => connectToPeer(peerIdInput.value);

    // Birisi bize bağlanırsa
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnectionEvents();
        statusEl.innerText = "Bir cihaz size bağlandı!";
    });

    function setupConnectionEvents() {
        conn.on('open', () => {
            statusEl.innerText = "Bağlantı kuruldu! Dosya gönderebilirsiniz.";
            transferArea.style.display = "block";
        });

        conn.on('data', (data) => {
            statusEl.innerText = "Dosya geliyor...";
            const blob = new Blob([data.file]);
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = data.filename;
            downloadLink.style.display = "block";
            downloadLink.innerText = "📥 İndir: " + data.filename;
            statusEl.innerText = "Dosya başarıyla alındı!";
        });

        conn.on('error', (err) => {
            statusEl.innerText = "Bağlantı hatası!";
            console.error(err);
        });
    }

    // 5. Dosya Gönderimi
    document.getElementById('send-btn').onclick = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) return alert("Lütfen önce bir dosya seçin.");

        statusEl.innerText = "Dosya okunuyor...";
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ file: reader.result, filename: file.name });
            statusEl.innerText = "Dosya gönderildi!";
        };
        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
