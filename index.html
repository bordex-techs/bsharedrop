<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BShareDrop | Pro Speed</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00f2ff; --bg: #050505; --card-bg: #111; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 30px; width: 90%; max-width: 440px; text-align: center; border: 1px solid #222; }
        h1 { font-size: 24px; color: var(--primary); margin-bottom: 5px; }
        #qrcode { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin: 15px 0; }
        .btn { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 800; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; font-size: 12px; }
        .stat-box { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .stat-val { color: var(--primary); display: block; font-size: 16px; font-weight: bold; }
        .progress-container { background: #333; height: 10px; border-radius: 5px; margin: 15px 0; overflow: hidden; display: none; }
        .progress-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: width 0.1s; }
        #chat-area { height: 80px; overflow-y: auto; background: #000; border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 12px; text-align: left; }
        input[type="file"] { font-size: 12px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>BSHAREDROP</h1>
    
    <div id="setup-area">
        <div id="qrcode"></div>
        <p style="font-size: 12px; color: #666;">BAĞLANMAK İÇİN TARAT</p>
    </div>

    <div id="transfer-area" style="display:none;">
        <div id="chat-area"></div>
        <div class="stats-grid">
            <div class="stat-box">HIZ<span id="speed" class="stat-val">0 MB/s</span></div>
            <div class="stat-box">KALAN<span id="remaining" class="stat-val">0s</span></div>
        </div>
        
        <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>

        <input type="file" id="file-input">
        <button class="btn" id="send-btn">DOSYAYI FIRLAT</button>
    </div>

    <a id="download-link" style="display:none; margin-top:15px; color:#00ff88; text-decoration:none; font-weight:bold;">📥 DOSYAYI KAYDET</a>
    <p id="status" style="font-size: 11px; color: #444; margin-top: 10px;">ID: <span id="my-id">...</span></p>
</div>

<script>
    const peer = new Peer({ config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}});
    let conn;
    const CHUNK_SIZE = 16384; // 16KB paketler (Hız için ideal)

    peer.on('open', (id) => {
        document.getElementById('my-id').innerText = id;
        const shareUrl = `${window.location.origin}${window.location.pathname}?id=${id}`;
        new QRCode(document.getElementById("qrcode"), { text: shareUrl, width: 150, height: 150 });
        const targetId = new URLSearchParams(window.location.search).get('id');
        if (targetId) connect(targetId);
    });

    peer.on('connection', (c) => { conn = c; setup(); });
    function connect(id) { conn = peer.connect(id, { reliable: true }); setup(); }

    function setup() {
        conn.on('open', () => {
            document.getElementById('setup-area').style.display = "none";
            document.getElementById('transfer-area').style.display = "block";
        });

        let receivedChunks = [];
        conn.on('data', (data) => {
            if(data.type === 'file-start') {
                receivedChunks = [];
                document.getElementById('p-cont').style.display = "block";
            }
            if(data.type === 'file-chunk') {
                receivedChunks.push(data.chunk);
                updateProgress(data.progress, data.speed, data.remaining);
            }
            if(data.type === 'file-end') {
                const blob = new Blob(receivedChunks);
                const url = URL.createObjectURL(blob);
                const dl = document.getElementById('download-link');
                dl.href = url; dl.download = data.name; dl.style.display = "block";
                document.getElementById('p-bar').style.width = "100%";
            }
        });
    }

    function updateProgress(percent, speed, remain) {
        document.getElementById('p-bar').style.width = percent + "%";
        document.getElementById('speed').innerText = speed.toFixed(2) + " MB/s";
        document.getElementById('remaining').innerText = Math.round(remain) + "s";
    }

    document.getElementById('send-btn').onclick = async () => {
        const file = document.getElementById('file-input').files[0];
        if(!file) return;

        document.getElementById('p-cont').style.display = "block";
        conn.send({ type: 'file-start' });

        const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
        let offset = 0;
        let startTime = Date.now();

        for (let i = 0; i < totalChunks; i++) {
            const chunk = file.slice(offset, offset + CHUNK_SIZE);
            const buffer = await chunk.arrayBuffer();
            
            offset += CHUNK_SIZE;
            const elapsed = (Date.now() - startTime) / 1000;
            const bytesSent = Math.min(offset, file.size);
            const speed = (bytesSent / 1024 / 1024) / elapsed; // MB/s
            const remainingBytes = file.size - bytesSent;
            const remainingTime = speed > 0 ? (remainingBytes / 1024 / 1024) / speed : 0;
            const progress = (bytesSent / file.size) * 100;

            conn.send({
                type: 'file-chunk',
                chunk: buffer,
                progress: progress,
                speed: speed,
                remaining: remainingTime
            });

            updateProgress(progress, speed, remainingTime);
            
            // Tarayıcıyı kasmamak için çok kısa ara ver (hız dengesi)
            if (i % 20 === 0) await new Promise(r => setTimeout(r, 1));
        }

        conn.send({ type: 'file-end', name: file.name });
    };
</script>
</body>
</html>
