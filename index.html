<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bsharedrop v14 - Final</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --accent: #22d3ee; --panel: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--accent); margin: 0; padding: 10px; }
        .card { background: var(--panel); padding: 20px; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid #1e293b; margin: 0 auto; }
        .status { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85em; text-align: center; border: 1px solid var(--accent); font-weight: bold; }
        
        #qrcode-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; }
        .big-key { color: #020617; font-size: 1.5em; font-weight: bold; margin-top: 10px; font-family: monospace; }
        
        /* Orijinal, Doğrudan Native Dosya Seçici */
        .native-file-input {
            display: block; width: 100%; background: #1e293b; color: white; padding: 15px; border: 2px dashed var(--accent); border-radius: 12px; cursor: pointer; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        .native-file-input::file-selector-button {
            background: var(--accent); color: #020617; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 15px; font-family: sans-serif;
        }

        .btn { display: block; cursor: pointer; color: #020617; font-weight: bold; background: var(--accent); padding: 15px; width: 100%; border-radius: 12px; margin-bottom: 10px; text-align: center; border: none; font-size: 1.1em; }
        input[type="text"] { background: #1e293b; border: 1px solid #334155; color: white; padding: 15px; width: 100%; margin-bottom: 10px; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 1em; }
        
        .file-list { margin: 15px 0; max-height: 200px; overflow-y: auto; background: #020617; border-radius: 10px; border: 1px solid #334155; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e293b; font-size: 0.9em; }

        #editor-layer { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index: 10001; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: white; max-width: 95%; max-height: 70%; border-radius: 8px; touch-action: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0 0 15px 0;">bsharedrop Final 🚀</h2>
    <div id="status" class="status">SİSTEM BAŞLATILIYOR...</div>

    <div id="setup-area">
        <div id="qrcode-box">
            <div id="qrcode"></div>
            <div class="big-key" id="my-id-display">...</div>
        </div>
        <input type="text" id="target-id" placeholder="BAĞLANILACAK KODU GİRİN">
        <button class="btn" onclick="connectToPeer(document.getElementById('target-id').value)">CİHAZLAR ARASI BAĞLAN</button>
    </div>

    <div id="app-area" style="display:none;">
        <input type="file" id="file-input" class="native-file-input" multiple onchange="handleFiles(event)">
        
        <div class="file-list" id="file-list-ui"></div>

        <input type="text" id="secret-msg" placeholder="Gizli not ekle...">
        <button class="btn" onclick="sendAll()" style="background: #fbbf24; margin-top:10px;">TÜM DOSYALARI GÖNDER</button>
    </div>

    <div id="receive-area" style="display:none;">
        <div style="background: #1e293b; padding: 20px; border-radius: 12px; border: 2px solid var(--accent);">
            <h3 style="margin:0 0 15px 0; text-align:center;">📦 DOSYALAR GELDİ</h3>
            <div id="in-msg" style="background:#020617; padding:15px; border-radius:8px; margin-bottom:15px; display:none; border-left:4px solid var(--accent); font-weight:bold;"></div>
            <div id="incoming-list" class="file-list" style="margin:0;"></div>
            <button class="btn" style="background:transparent; color:white; border:1px solid white; margin-top:20px;" onclick="location.reload()">KAPAT VE YENİLE</button>
        </div>
    </div>
</div>

<div id="editor-layer">
    <h3 style="color:white; margin-bottom:15px;">RESMİ DÜZENLE</h3>
    <canvas id="editor-canvas"></canvas>
    <div style="display:flex; gap:10px; margin-top:20px; width:90%; max-width:400px;">
        <button class="btn" onclick="closeEditor(false)" style="background:#ef4444; color:white;">İPTAL</button>
        <button class="btn" onclick="closeEditor(true)">KAYDET</button>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('editor-canvas');
    const ctx = canvas.getContext('2d');
    const myID = 'BS-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    const peer = new Peer(myID);
    let conn, fileQueue = [], currentEditIdx = null;

    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = id;
        new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?key=" + id, width: 160, height: 160 });
        statusEl.innerText = "KİMLİK: " + id;
        const urlKey = new URLSearchParams(window.location.search).get('key');
        if (urlKey) { document.getElementById('target-id').value = urlKey; setTimeout(() => connectToPeer(urlKey), 800); }
    });

    function connectToPeer(id) {
        if(!id || id === myID) return;
        statusEl.innerText = "CİHAZA BAĞLANILIYOR...";
        conn = peer.connect(id, { reliable: true });
        setupEvents();
    }

    peer.on('connection', (c) => { conn = c; setupEvents(); });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ BAĞLANTI BAŞARILI";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
        });
        conn.on('data', (data) => showIncoming(data));
        conn.on('close', () => { alert("Bağlantı koptu!"); location.reload(); });
    }

    // ARTIK ÇÖKMEYEN, ANINDA ÇALIŞAN DOSYA OKUYUCU
    function handleFiles(e) {
        const files = e.target.files;
        if(!files || files.length === 0) return;
        
        for(let i = 0; i < files.length; i++) {
            const f = files[i];
            // Ağır FileReader yerine saniyelik ObjectURL kullanıyoruz
            const isImage = f.type.startsWith('image/');
            const previewUrl = isImage ? URL.createObjectURL(f) : null;
            
            fileQueue.push({ 
                file: f, 
                name: f.name, 
                type: f.type, 
                preview: previewUrl, 
                edited: false,
                editedBlob: null
            });
        }
        updateUI();
        statusEl.innerText = files.length + " dosya listeye eklendi.";
    }

    function updateUI() {
        const list = document.getElementById('file-list-ui');
        list.innerHTML = "";
        fileQueue.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = "file-item";
            div.innerHTML = `
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:65%;">${item.name}</span>
                <div style="display:flex; gap:8px;">
                    ${item.preview ? `<button onclick="openEditor(${idx})" style="padding:6px 10px; border:1px solid #fbbf24; color:#fbbf24; background:none; border-radius:6px; cursor:pointer;">✏️</button>` : ''}
                    <button onclick="fileQueue.splice(${idx},1); updateUI();" style="padding:6px 10px; border:1px solid #ef4444; color:#ef4444; background:none; border-radius:6px; cursor:pointer;">X</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function openEditor(idx) {
        currentEditIdx = idx;
        const img = new Image();
        img.onload = () => {
            document.getElementById('editor-layer').style.display = 'flex';
            const ratio = (window.innerWidth * 0.9) / img.width;
            canvas.width = window.innerWidth * 0.9;
            canvas.height = img.height * ratio;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "red"; ctx.lineWidth = 5; ctx.lineCap = "round";
        };
        img.src = fileQueue[idx].preview;
    }

    let drawing = false;
    canvas.onmousedown = canvas.ontouchstart = (e) => { drawing = true; ctx.beginPath(); };
    canvas.onmousemove = canvas.ontouchmove = (e) => {
        if(!drawing) return; e.preventDefault();
        const r = canvas.getBoundingClientRect();
        const c = e.touches ? e.touches[0] : e;
        ctx.lineTo(c.clientX - r.left, c.clientY - r.top); ctx.stroke();
    };
    window.onmouseup = window.ontouchend = () => drawing = false;

    function closeEditor(save) {
        if(save) {
            canvas.toBlob((blob) => {
                fileQueue[currentEditIdx].preview = URL.createObjectURL(blob);
                fileQueue[currentEditIdx].editedBlob = blob;
                fileQueue[currentEditIdx].edited = true;
                updateUI();
                document.getElementById('editor-layer').style.display = 'none';
            }, "image/png");
        } else {
            document.getElementById('editor-layer').style.display = 'none';
        }
    }

    // DOĞRUDAN BLOB TRANSFERİ (Bilgisayar ve Telefonlar Arası %100 Uyum)
    function sendAll() {
        if(!conn || !conn.open) return alert("Cihazlar bağlı değil!");
        if(fileQueue.length === 0) return alert("Hiç dosya seçmedin!");
        
        statusEl.innerText = "Dosyalar aktarılıyor...";
        const payload = { msg: document.getElementById('secret-msg').value, files: [] };
        
        for(let item of fileQueue) {
            let fileData = item.edited ? item.editedBlob : item.file;
            payload.files.push({ name: item.name, type: item.type, blob: fileData });
        }
        
        conn.send(payload);
        statusEl.innerText = "✅ TÜM DOSYALAR GİTTİ!";
        fileQueue = []; 
        updateUI();
        document.getElementById('file-input').value = ""; // Butonu sıfırla
    }

    function showIncoming(data) {
        document.getElementById('app-area').style.display = 'none';
        document.getElementById('receive-area').style.display = 'block';
        
        if(data.msg) {
            const m = document.getElementById('in-msg');
            m.innerText = "GİZLİ NOT: " + data.msg; 
            m.style.display = "block";
        }
        
        const list = document.getElementById('incoming-list');
        list.innerHTML = "";
        
        data.files.forEach(f => {
            // Gelen ham veriyi anında indirilebilir linke çevir
            const finalBlob = new Blob([f.blob], {type: f.type});
            const url = URL.createObjectURL(finalBlob);
            
            const div = document.createElement('div');
            div.className = "file-item";
            div.style.background = "#0f172a";
            div.innerHTML = `
                <span style="width:60%; overflow:hidden; text-overflow:ellipsis;">${f.name}</span>
                <a href="${url}" download="${f.name}" style="text-decoration:none;">
                    <button style="background:var(--accent); border:none; padding:8px 12px; border-radius:6px; font-weight:bold; cursor:pointer;">İNDİR</button>
                </a>
            `;
            list.appendChild(div);
        });
        statusEl.innerText = "DOSYALAR BAŞARIYLA ALINDI!";
    }
</script>
</body>
</html>
