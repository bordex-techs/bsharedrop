<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bsharedrop v13</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --accent: #22d3ee; --panel: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: var(--accent); margin: 0; padding: 10px; overflow-x: hidden; }
        .card { background: var(--panel); padding: 20px; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid #1e293b; margin: 0 auto; position: relative; }
        .status { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.75em; text-align: center; border: 1px solid var(--accent); }
        
        /* DEV DOSYA SEÇİCİ ALANI */
        .mega-upload-area {
            position: relative;
            width: 100%;
            height: 120px;
            background: rgba(34, 211, 238, 0.1);
            border: 3px dashed var(--accent);
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            z-index: 9999; /* En üstte olmasını sağlar */
        }
        
        .mega-upload-area input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10000; /* İnput en üstte */
        }

        .upload-text { pointer-events: none; text-align: center; font-weight: bold; font-size: 1.1em; }

        .btn { display: block; cursor: pointer; color: #020617; font-weight: bold; background: var(--accent); padding: 16px; width: 100%; border-radius: 12px; margin-bottom: 10px; text-align: center; border: none; font-size: 1.1em; }
        input[type="text"] { background: #1e293b; border: 1px solid #334155; color: white; padding: 14px; width: 100%; margin-bottom: 10px; border-radius: 12px; box-sizing: border-box; outline: none; }
        
        .file-list { margin: 15px 0; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .file-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #1e293b; font-size: 0.85em; }

        /* Editör Katmanı */
        #editor-layer { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 10001; flex-direction: column; align-items: center; justify-content: center; }
        canvas { background: white; max-width: 95%; max-height: 70%; border-radius: 8px; touch-action: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0 0 15px 0; letter-spacing: -1px;">bsharedrop 13 🚀</h2>
    <div id="status" class="status">SİNYAL AKTİF...</div>

    <div id="setup-area">
        <div style="background:white; padding:15px; border-radius:12px; margin-bottom:15px; display:flex; flex-direction:column; align-items:center;">
            <div id="qrcode"></div>
            <div style="color:#020617; font-size:1.5em; font-weight:bold; margin-top:10px; font-family:monospace;" id="my-id-display">...</div>
        </div>
        <input type="text" id="target-id" placeholder="HEDEF KODU">
        <button class="btn" onclick="connectToPeer(document.getElementById('target-id').value)">CİHAZA BAĞLAN</button>
    </div>

    <div id="app-area" style="display:none;">
        <div class="mega-upload-area">
            <input type="file" id="file-input" multiple onchange="handleFiles(event)">
            <div class="upload-text">➕ DOSYALARI EKLE<br><span style="font-size:0.6em; opacity:0.7;">(BURAYA DOKUN)</span></div>
        </div>
        
        <div class="file-list" id="file-list-ui"></div>

        <input type="text" id="secret-msg" placeholder="Gizli not...">
        <button class="btn" onclick="sendAll()" style="background: #fbbf24;">TÜMÜNÜ GÖNDER 🚀</button>
    </div>

    <div id="receive-area" style="display:none;">
        <div style="background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid var(--accent);">
            <h3 style="margin:0 0 15px 0; text-align:center;">PAKET GELDİ!</h3>
            <div id="in-msg" style="background:#020617; padding:12px; border-radius:10px; margin-bottom:15px; display:none; border-left:4px solid var(--accent);"></div>
            <div id="incoming-list"></div>
            <button class="btn" style="background:transparent; color:white; border:1px solid white; margin-top:15px;" onclick="location.reload()">KAPAT</button>
        </div>
    </div>
</div>

<div id="editor-layer">
    <h3 style="color:white; margin-bottom:10px;">DÜZENLE</h3>
    <canvas id="editor-canvas"></canvas>
    <div style="display:flex; gap:10px; margin-top:20px; width:90%; max-width:400px;">
        <button class="btn" onclick="closeEditor(false)" style="background:#ef4444; color:white;">VAZGEÇ</button>
        <button class="btn" onclick="closeEditor(true)">KAYDET</button>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('editor-canvas');
    const ctx = canvas.getContext('2d');
    const myID = 'BS-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    const peer = new Peer(myID);
    let conn, fileQueue = [], currentEditIdx = null;

    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = id;
        new QRCode(document.getElementById("qrcode"), { text: window.location.href.split('?')[0] + "?key=" + id, width: 150, height: 150 });
        statusEl.innerText = "KİMLİK: " + id;
        const urlKey = new URLSearchParams(window.location.search).get('key');
        if (urlKey) { document.getElementById('target-id').value = urlKey; setTimeout(() => connectToPeer(urlKey), 600); }
    });

    function connectToPeer(id) {
        if(!id || id === myID) return;
        statusEl.innerText = "BAĞLANTI ARANIYOR...";
        conn = peer.connect(id, { reliable: true });
        setupEvents();
    }

    peer.on('connection', (c) => { conn = c; setupEvents(); });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ BAĞLANTI KURULDU";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
        });
        conn.on('data', (data) => showIncoming(data));
        conn.on('close', () => { alert("Bağlantı koptu."); location.reload(); });
    }

    async function handleFiles(e) {
        const files = Array.from(e.target.files);
        if(files.length === 0) return;
        
        statusEl.innerText = "İşleniyor...";
        for(let f of files) {
            const dataUrl = f.type.startsWith('image/') ? await toDataUrl(f) : null;
            fileQueue.push({ file: f, name: f.name, type: f.type, preview: dataUrl, edited: false });
        }
        updateUI();
        statusEl.innerText = files.length + " dosya eklendi.";
    }

    function toDataUrl(file) {
        return new Promise(res => {
            const r = new FileReader();
            r.onload = (e) => res(e.target.result);
            r.readAsDataURL(file);
        });
    }

    function updateUI() {
        const list = document.getElementById('file-list-ui');
        list.innerHTML = "";
        fileQueue.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = "file-item";
            div.innerHTML = `
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:60%;">${item.name}</span>
                <div style="display:flex; gap:10px;">
                    ${item.type.startsWith('image/') ? `<button onclick="openEditor(${idx})" style="padding:6px; border:1px solid #fbbf24; color:#fbbf24; background:none; border-radius:6px;">✏️</button>` : ''}
                    <button onclick="fileQueue.splice(${idx},1); updateUI();" style="padding:6px; border:1px solid #ef4444; color:#ef4444; background:none; border-radius:6px;">X</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function openEditor(idx) {
        currentEditIdx = idx;
        const img = new Image();
        img.onload = () => {
            document.getElementById('editor-layer').style.display = 'flex';
            const ratio = window.innerWidth * 0.9 / img.width;
            canvas.width = window.innerWidth * 0.9;
            canvas.height = img.height * ratio;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "red"; ctx.lineWidth = 5; ctx.lineCap = "round";
        };
        img.src = fileQueue[idx].preview;
    }

    let drawing = false;
    canvas.onmousedown = canvas.ontouchstart = (e) => { drawing = true; ctx.beginPath(); };
    canvas.onmousemove = canvas.ontouchmove = (e) => {
        if(!drawing) return; e.preventDefault();
        const r = canvas.getBoundingClientRect();
        const c = e.touches ? e.touches[0] : e;
        ctx.lineTo(c.clientX - r.left, c.clientY - r.top); ctx.stroke();
    };
    window.onmouseup = window.ontouchend = () => drawing = false;

    function closeEditor(save) {
        if(save) {
            fileQueue[currentEditIdx].preview = canvas.toDataURL("image/png");
            fileQueue[currentEditIdx].edited = true;
            updateUI();
        }
        document.getElementById('editor-layer').style.display = 'none';
    }

    async function sendAll() {
        if(!conn || !conn.open) return;
        statusEl.innerText = "Işınlanıyor...";
        const payload = { msg: document.getElementById('secret-msg').value, files: [] };
        for(let item of fileQueue) {
            const buffer = item.edited ? await (await fetch(item.preview)).arrayBuffer() : await item.file.arrayBuffer();
            payload.files.push({ name: item.name, type: item.type, data: buffer });
        }
        conn.send(payload);
        statusEl.innerText = "✅ GÖNDERİLDİ!";
        fileQueue = []; updateUI();
    }

    function showIncoming(data) {
        document.getElementById('app-area').style.display = 'none';
        document.getElementById('receive-area').style.display = 'block';
        if(data.msg) {
            const m = document.getElementById('in-msg');
            m.innerText = "MESAJ: " + data.msg; m.style.display = "block";
        }
        const list = document.getElementById('incoming-list');
        list.innerHTML = "";
        data.files.forEach(f => {
            const url = URL.createObjectURL(new Blob([f.data], {type: f.type}));
            const div = document.createElement('div');
            div.className = "file-item";
            div.innerHTML = `<span>${f.name}</span><a href="${url}" download="${f.name}"><button class="btn" style="width:auto; margin:0; padding:8px 15px; font-size:0.8em;">İNDİR</button></a>`;
            list.appendChild(div);
        });
        statusEl.innerText = "PAKET ALINDI!";
    }
</script>
</body>
</html>
