<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Dosya Paylaşımı</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; width: 100%; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; border: 10px solid white; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .status { font-size: 0.9em; color: #555; margin: 10px 0; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dosya Paylaş (QR)</h2>
    
    <div id="my-info">
        <p>Bu QR kodu diğer cihaza okutun:</p>
        <div id="qrcode"></div>
        <p>ID: <strong id="my-id">Oluşturuluyor...</strong></p>
    </div>

    <hr>

    <div id="transfer-area" style="display:none;">
        <p id="connected-with"></p>
        <input type="file" id="file-input">
        <button class="btn" id="send-btn">Dosyayı Gönder</button>
    </div>

    <p id="status" class="status">Durum: Bekleniyor...</p>
    <a id="download-link" style="display:none; font-weight:bold; color:#28a745; text-decoration: none;">⬇ Dosyayı İndirmek İçin Tıkla</a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const myIdEl = document.getElementById('my-id');
    const transferArea = document.getElementById('transfer-area');
    const connectedWithEl = document.getElementById('connected-with');
    
    // PeerJS bağlantısını başlat
    const peer = new Peer();
    let conn;

    // URL'deki "id" parametresini kontrol et
    const urlParams = new URLSearchParams(window.location.search);
    const targetPeerId = urlParams.get('id');

    // 1. Peer açıldığında çalışacaklar
    peer.on('open', (id) => {
        myIdEl.innerText = id;
        
        // QR Kodun içine mevcut URL + ?id=ID ekliyoruz
        const shareUrl = window.location.origin + window.location.pathname + "?id=" + id;
        
        new QRCode(document.getElementById("qrcode"), {
            text: shareUrl,
            width: 200,
            height: 200
        });

        // Eğer linkten tıklandığında bir ID varsa otomatik bağlan
        if (targetPeerId) {
            statusEl.innerText = "Otomatik bağlanılıyor...";
            connectToPeer(targetPeerId);
        }
    });

    // 2. Bağlantı isteği geldiğinde (Alıcı tarafı)
    peer.on('connection', (c) => {
        conn = c;
        setupEvents();
    });

    // 3. Bağlantı Kurma Fonksiyonu (Gönderici tarafı)
    function connectToPeer(id) {
        conn = peer.connect(id);
        setupEvents();
    }

    // 4. Olayları Ayarla (Veri alışverişi vb.)
    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "Bağlantı Başarılı!";
            statusEl.style.color = "green";
            transferArea.style.display = "block";
            connectedWithEl.innerText = "Bağlı cihaz: " + conn.peer;
        });
        
        conn.on('data', (data) => {
            const blob = new Blob([data.file]);
            const url = URL.createObjectURL(blob);
            const dl = document.getElementById('download-link');
            dl.href = url;
            dl.download = data.filename;
            dl.style.display = "block";
            dl.innerText = "⬇ İndir: " + data.filename;
            statusEl.innerText = "Yeni dosya geldi!";
        });

        conn.on('close', () => {
            statusEl.innerText = "Bağlantı kesildi.";
            transferArea.style.display = "none";
        });
    }

    // 5. Dosya Gönderme İşlemi
    document.getElementById('send-btn').onclick = () => {
        const fileInput = document.getElementById('file-input');
        if (fileInput.files.length === 0) {
            alert("Lütfen bir dosya seçin.");
            return;
        }

        const file = fileInput.files[0];
        statusEl.innerText = "Dosya okunuyor...";
        
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({ 
                file: reader.result, 
                filename: file.name 
            });
            statusEl.innerText = "Dosya gönderildi!";
        };
        reader.readAsArrayBuffer(file);
    };
</script>
</body>
</html>
