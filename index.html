<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Transfer PRO</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/quiet/quiet-js/quiet.js"></script>
    <style>
        :root { --p: #8b5cf6; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #334155; }
        .status { background: #334155; padding: 12px; border-radius: 10px; margin: 15px 0; font-size: 0.85em; border-left: 4px solid var(--p); }
        canvas { background: white; border-radius: 10px; touch-action: none; width: 100%; height: 200px; margin-top: 10px; }
        .btn { border: none; padding: 14px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        .btn-sonic { background: linear-gradient(to right, #ec4899, #8b5cf6); }
        #qrcode { display: flex; justify-content: center; background: white; padding: 10px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sonic Paylaşım 🔊</h2>
    <div id="status" class="status">Sistem başlatılıyor...</div>

    <div id="setup-area">
        <button class="btn btn-sonic" onclick="broadcastId()">🔊 Ses Yayını Yap</button>
        <button class="btn btn-sonic" style="filter:hue-rotate(90deg);" onclick="startListening()">🎤 Ses Dinle ve Bağlan</button>
        <hr style="opacity:0.1; margin:20px 0;">
        <div id="qrcode"></div>
    </div>

    <div id="app-area" style="display:none;">
        <canvas id="live-canvas"></canvas>
        <button class="btn" style="background:#475569;" onclick="clearCanvas()">Temizle</button>
        <input type="file" id="file-input" style="margin-top:20px; width:100%;">
        <button class="btn" style="background:#10b981;" id="send-btn">Dosyayı Gönder</button>
    </div>
    
    <a id="download-link" style="display:none; color:#10b981; margin-top:20px; display:block;"></a>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('live-canvas');
    const ctx = canvas.getContext('2d');
    const peer = new Peer();
    let myId, conn;

    // Quiet.js Başlatma
    Quiet.init({
        profiles_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/quiet-profiles.json",
        memory_initializer_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/",
        libfec_prefix: "https://cdn.jsdelivr.net/gh/quiet/quiet-js/"
    });

    peer.on('open', (id) => {
        myId = id;
        new QRCode(document.getElementById("qrcode"), { 
            text: window.location.href.split('?')[0] + "?join=" + id, 
            width: 150, height: 150 
        });
        statusEl.innerText = "Hazır! Sesle bağlanmayı dene.";
        if (new URLSearchParams(window.location.search).get('join')) connectToPeer(new URLSearchParams(window.location.search).get('join'));
    });

    // --- SESLE EŞLEŞME (MİKROFON DÜZELTMELİ) ---
    async function broadcastId() {
        if (Quiet.audioContext.state === 'suspended') await Quiet.audioContext.resume();
        const transmitter = Quiet.transmitter({profile: "ultrasonic-experimental"});
        transmitter.transmit(Quiet.str2ab(myId));
        statusEl.innerText = "🔊 Ses gönderiliyor...";
    }

    async function startListening() {
        try {
            // Zorla mikrofon izni iste
            await navigator.mediaDevices.getUserMedia({ audio: true });
            if (Quiet.audioContext.state === 'suspended') await Quiet.audioContext.resume();
            
            statusEl.innerText = "🎤 Dinleniyor... Diğer telden yayını aç.";
            Quiet.receiver({
                profile: "ultrasonic-experimental",
                onReceive: (p) => { connectToPeer(Quiet.ab2str(p)); statusEl.innerText = "Bağlanıyor..."; },
                onReceiverError: () => { statusEl.innerText = "Mikrofon hatası!"; }
            });
        } catch (err) {
            statusEl.innerText = "❌ Mikrofon izni reddedildi!";
        }
    }

    // --- BAĞLANTI VE TUVAL ---
    function connectToPeer(id) {
        conn = peer.connect(id);
        setupEvents();
    }
    peer.on('connection', (c) => { conn = c; setupEvents(); });

    function setupEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ Bağlandı!";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
        });
        conn.on('data', (d) => {
            if (d.type === 'draw') draw(d.x, d.y, d.isNew, false);
            else if (d.type === 'clear') ctx.clearRect(0,0,350,200);
            else handleFile(d);
        });
    }

    // Çizim
    canvas.width = 350; canvas.height = 200;
    ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#8b5cf6';
    let drawing = false;
    function draw(x, y, isNew, send) {
        if (isNew) ctx.beginPath();
        ctx.lineTo(x, y); ctx.stroke();
        if (send && conn) conn.send({type:'draw', x, y, isNew});
    }
    function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const c = e.touches ? e.touches[0] : e;
        return { x: c.clientX - r.left, y: c.clientY - r.top };
    }
    canvas.onmousedown = (e) => { drawing = true; draw(getPos(e).x, getPos(e).y, true, true); };
    canvas.onmousemove = (e) => { if(drawing) draw(getPos(e).x, getPos(e).y, false, true); };
    canvas.onmouseup = () => drawing = false;
    canvas.ontouchstart = (e) => { e.preventDefault(); drawing = true; draw(getPos(e).x, getPos(e).y, true, true); };
    canvas.ontouchmove = (e) => { e.preventDefault(); if(drawing) draw(getPos(e).x, getPos(e).y, false, true); };
    canvas.ontouchend = () => drawing = false;
    function clearCanvas() { ctx.clearRect(0,0,350,200); conn.send({type:'clear'}); }

    // Dosya
    function handleFile(d) {
        const url = URL.createObjectURL(new Blob([d.file]));
        const dl = document.getElementById('download-link');
        dl.href = url; dl.download = d.filename; dl.innerText = "📥 Dosyayı İndir: " + d.filename; dl.style.display = "block";
    }
    document.getElementById('send-btn').onclick = () => {
        const f = document.getElementById('file-input').files[0];
        const r = new FileReader();
        r.onload = () => conn.send({ file: r.result, filename: f.name });
        r.readAsArrayBuffer(f);
    };
</script>
</body>
</html>
