<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bsharedrop - Hızlı Transfer</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #020617; --accent: #22d3ee; --panel: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--accent); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: var(--panel); padding: 25px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #1e293b; }
        .status { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.8em; text-align: center; border: 1px solid var(--accent); }
        
        #qr-container { background: white; padding: 15px; border-radius: 12px; margin: 15px 0; display: flex; flex-direction: column; align-items: center; }
        #qrcode { filter: invert(1) hue-rotate(180deg); }
        .big-key { color: #020617; font-size: 1.6em; font-weight: 900; margin-top: 10px; font-family: monospace; border-top: 2px dashed #020617; padding-top: 5px; width: 100%; text-align: center; }
        
        input, button { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 8px; outline: none; }
        button { cursor: pointer; color: var(--accent); font-weight: bold; border-color: var(--accent); }
        button:active { transform: scale(0.98); }
        canvas { background: white; border-radius: 8px; width: 100%; height: 250px; }
        .progress-bar { height: 6px; background: #334155; margin: 10px 0; display: none; border-radius: 3px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin:0; letter-spacing: -1px;">bsharedrop ⚡</h2>
    <div id="status" class="status">SİSTEM BAŞLATILIYOR...</div>

    <div id="setup-area">
        <div id="qr-container">
            <div id="qrcode"></div>
            <div class="big-key" id="my-id-display">...</div>
        </div>
        <input type="text" id="target-id" placeholder="HEDEF ANAHTARI GİRİN">
        <button onclick="connectToPeer(document.getElementById('target-id').value)">BAĞLAN</button>
    </div>

    <div id="app-area" style="display:none;">
        <canvas id="live-canvas"></canvas>
        <div style="display:flex; gap:5px; margin: 5px 0;">
            <button style="font-size:0.7em;" onclick="clearCanvas()">TEMİZLE</button>
            <button style="font-size:0.7em;" onclick="document.getElementById('img-loader').click()">RESİM YÜKLE</button>
        </div>
        <input type="file" id="img-loader" style="display:none" accept="image/*" onchange="loadImgToCanvas(event)">

        <input type="text" id="secret-msg" placeholder="GİZLİ NOT">
        <div class="progress-bar" id="p-bar"><div id="progress-fill"></div></div>
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendPayload()" style="background: var(--accent); color: #020617;">DOSYAYI GÖNDER 🚀</button>
    </div>

    <div id="receive-area" style="display:none;">
        <div id="msg-display" style="background:#1e293b; padding:10px; margin-bottom:10px; border-radius:8px; display:none;"></div>
        <a id="download-link" style="text-decoration:none;"><button>İNDİR VE KAYDET</button></a>
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');
    const canvas = document.getElementById('live-canvas');
    const ctx = canvas.getContext('2d');
    
    // bsharedrop Kimliği
    const myID = 'BS-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    const peer = new Peer(myID);
    let conn;

    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = id;
        const syncLink = window.location.origin + window.location.pathname + "?key=" + id;
        new QRCode(document.getElementById("qrcode"), { text: syncLink, width: 180, height: 180 });
        statusEl.innerText = "HAZIR: " + id;

        const urlKey = new URLSearchParams(window.location.search).get('key');
        if (urlKey) {
            document.getElementById('target-id').value = urlKey;
            setTimeout(() => connectToPeer(urlKey), 800);
        }
    });

    function connectToPeer(id) {
        if(!id || id === myID) return;
        statusEl.innerText = "BAĞLANTI KURULUYOR...";
        conn = peer.connect(id, { reliable: true });
        bindEvents();
    }

    peer.on('connection', (c) => {
        conn = c;
        bindEvents();
    });

    function bindEvents() {
        conn.on('open', () => {
            statusEl.innerText = "✅ BAĞLANTI TAMAMLANDI";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('app-area').style.display = 'block';
        });

        conn.on('data', (data) => {
            if(data.type === 'draw') draw(data.x, data.y, data.isNew, false);
            else if(data.type === 'clear') ctx.clearRect(0,0,canvas.width,canvas.height);
            else if(data.type === 'payload') handleIncoming(data);
        });

        conn.on('close', () => {
            statusEl.innerText = "Bağlantı kesildi, lütfen sayfayı yenileyin.";
            alert("Bağlantı koptu.");
        });
    }

    // TUVAL
    canvas.width = 400; canvas.height = 250;
    ctx.lineWidth = 4; ctx.strokeStyle = '#22d3ee'; ctx.lineCap = 'round';
    let drawing = false;

    function draw(x, y, isNew, send) {
        if (isNew) ctx.beginPath();
        ctx.lineTo(x, y); ctx.stroke();
        if (send && conn && conn.open) conn.send({type:'draw', x, y, isNew});
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const c = e.touches ? e.touches[0] : e;
        return { x: (c.clientX - r.left) * (canvas.width / r.width), y: (c.clientY - r.top) * (canvas.height / r.height) };
    };

    canvas.onmousedown = (e) => { drawing = true; const p = getPos(e); draw(p.x, p.y, true, true); };
    canvas.onmousemove = (e) => { if(drawing) { const p = getPos(e); draw(p.x, p.y, false, true); } };
    window.onmouseup = () => drawing = false;

    function clearCanvas() { ctx.clearRect(0,0,canvas.width,canvas.height); if(conn.open) conn.send({type:'clear'}); }
    function loadImgToCanvas(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    // TRANSFER
    function sendPayload() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if(!file) { alert("Lütfen önce bir dosya seçin!"); return; }
        if(!conn || !conn.open) { alert("Bağlantı aktif değil!"); return; }

        statusEl.innerText = "GÖNDERİLİYOR...";
        document.getElementById('p-bar').style.display = "block";
        document.getElementById('progress-fill').style.width = "30%";

        const reader = new FileReader();
        reader.onload = () => {
            try {
                conn.send({
                    type: 'payload',
                    file: reader.result,
                    name: file.name,
                    msg: document.getElementById('secret-msg').value
                });
                document.getElementById('progress-fill').style.width = "100%";
                statusEl.innerText = "GÖNDERİM BAŞARILI! ✅";
            } catch (err) {
                statusEl.innerText = "HATA: Tekrar dene.";
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function handleIncoming(data) {
        document.getElementById('app-area').style.display = 'none';
        document.getElementById('receive-area').style.display = 'block';
        statusEl.innerText = "DOSYA ALINDI!";
        
        if(data.msg) {
            const m = document.getElementById('msg-display');
            m.innerText = "NOT: " + data.msg; m.style.display = "block";
        }

        const dl = document.getElementById('download-link');
        const blob = new Blob([data.file]);
        dl.href = URL.createObjectURL(blob);
        dl.download = data.name;
    }
</script>
</body>
</html>
